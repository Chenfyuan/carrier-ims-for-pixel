def kFile = rootProject.file('local.properties')
def props = new Properties()
if (kFile.canRead()) {
    props.load(new FileInputStream(kFile))
}

def storeFilePath = props['SIGN_KEY_STORE_FILE'] ?: System.getenv('SIGN_KEY_STORE_FILE')
if (storeFilePath != null && !storeFilePath.isEmpty()) {
    android.signingConfigs.sign.storeFile file(storeFilePath)
    android.signingConfigs.sign.storePassword props['SIGN_KEY_STORE_PASSWORD'] ?: System.getenv('SIGN_KEY_STORE_PASSWORD')
    android.signingConfigs.sign.keyAlias props['SIGN_KEY_ALIAS'] ?: System.getenv('SIGN_KEY_ALIAS')
    android.signingConfigs.sign.keyPassword props['SIGN_KEY_PASSWORD'] ?: System.getenv('SIGN_KEY_PASSWORD')
}
